name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build shared packages
        run: |
          npm run -w @shoplift/types build
          npm run -w @shoplift/db build
          npm run -w @shoplift/utils build

      - name: Lint web and admin
        run: |
          npm run -w @shoplift/web lint
          npm run -w @shoplift/admin lint

      - name: Build application workspaces
        run: |
          npm run -w @shoplift/api build
          npm run -w @shoplift/web build
          npm run -w @shoplift/admin build

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker build check (API)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: false

      - name: Docker build check (Web)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: false

      - name: Docker build check (Admin)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/admin/Dockerfile
          push: false
